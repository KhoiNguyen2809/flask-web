<!DOCTYPE html>
<html>
<head>
    <title>Thư viện Đề Tuyển Sinh</title>
</head>
<body>

<h1>📚 Thư viện Đề Tuyển Sinh</h1>

<form action="/exams" method="GET">

    <input
        type="text"
        name="q"
        placeholder="Tìm đề theo tên, môn hoặc năm..."
    >

    <button type="submit">
        🔍 Tìm kiếm
    </button>

</form>

<br>

<h2>🏆 Top 5 đề hot nhất</h2>

{% for exam in top_exams %}

<p>
{{ loop.index }}.
<a href="/exam/{{ exam[0] }}">
    {{ exam[1] }}
</a>

(👁️ {{ exam[5] }})
</p>

{% endfor %}
<p>
    <a href="/exams">📚 Kho đề</a>
</p>

<p>
    <a href="/feedback">💬 Góp ý</a>
</p>

<p>
    <a href="/submit_exam">📤 Gửi đề</a>
</p>

</body>
</html>
